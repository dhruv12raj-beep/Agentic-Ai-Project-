name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push backend image to ECR
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY_URI }}:latest ./backend
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          command_timeout: 60m
          script: |
            cd /home/ubuntu
            git clone https://github.com/dhruv12raj-beep/Agentic-Ai-Project-.git repo 2>/dev/null || (cd repo && git pull origin main)
            cd /home/ubuntu/repo/backend
            docker build -t support-backend:latest .
            cd /home/ubuntu/app
            sed -i 's|746486152961.dkr.ecr.ap-south-1.amazonaws.com/support-backend:latest|support-backend:latest|g' docker-compose.yml
            /usr/local/bin/docker-compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed successfully"